[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_ignores = True
ignore_missing_imports = True
explicit_package_bases = True

# Core pipeline — strict checking
[mypy-bar_aggregator]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-event_engine]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-levels]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-market_feed]
disallow_untyped_defs = True
disallow_incomplete_defs = True

[mypy-config]
disallow_untyped_defs = True

[mypy-log_config]
disallow_untyped_defs = True

# Looser checking for complex engines with dynamic attribute access
[mypy-confluence_engine]
disallow_incomplete_defs = True

[mypy-validator]
disallow_incomplete_defs = True

[mypy-risk_engine]
disallow_incomplete_defs = True

# Exclude legacy test scripts and simulation subpackage
[mypy-simulation]
ignore_errors = True
